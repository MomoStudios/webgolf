<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Golf</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #222;
        touch-action: none;
        user-select: none;
      }
      
      #game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      #canvas {
        touch-action: none;
      }
      
      #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 100;
        color: white;
        font-size: 18px;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
      }
      
      #message {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 200;
        color: white;
        font-size: 32px;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        text-align: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.5s;
      }
      
      #message.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="canvas"></canvas>
      <div id="ui">
        <div>Strokes: <span id="stroke-count">0</span></div>
      </div>
      <div id="message"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
